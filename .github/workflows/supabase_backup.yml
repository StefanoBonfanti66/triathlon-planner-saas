name: SUPABASE DAILY BACKUP

on:
  schedule:
    - cron: '0 2 * * *'  # Ogni giorno alle 2:00
  workflow_dispatch:      # Permette l'avvio manuale

permissions:
  contents: write

jobs:
  backup-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install supabase

      - name: Run Full Backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python tools/supabase_backup.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-json-backup
          path: backups/latest/*.json
          retention-days: 30

      - name: Commit Backups to Branch
        run: |
          git config --global user.name "Backup Bot"
          git config --global user.email "backup-bot@mtt.it"
          
          # Crea la cartella se non esiste
          mkdir -p backups_history
          
          # Copia i file 'latest' in una cartella datata nella history
          TIMESTAMP=$(date +%Y-%m-%d)
          mkdir -p "backups_history/$TIMESTAMP"
          cp -r backups/latest/* "backups_history/$TIMESTAMP/"
          
          git add backups_history/
          git commit -m "📦 Daily Backup: $TIMESTAMP" || echo "Nessuna modifica rilevata"
          git pull --rebase origin main
          git push origin main
